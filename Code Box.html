<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Box</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Inter, Segoe UI, sans-serif;
}

body{
    min-height:100vh;
    padding:40px 20px;
    background:
    radial-gradient(circle at top left,#8b5cf6 0%,transparent 30%),
    radial-gradient(circle at bottom right,#a855f7 0%,transparent 30%),
    #0f0f1a;
    color:white;
}

.container{
    max-width:1100px;
    margin:auto;
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    font-size:3rem;
    margin-bottom:10px;
}

.header p{
    opacity:.7;
}

.glass{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(16px);
    border:1px solid rgba(255,255,255,.1);
    border-radius:24px;
    box-shadow:0 8px 32px rgba(0,0,0,.3);
}

.tabs{
    display:flex;
    gap:12px;
    margin-bottom:20px;
}

.tab{
    border:none;
    padding:12px 24px;
    border-radius:12px;
    cursor:pointer;
    background:rgba(255,255,255,.08);
    color:white;
    transition:.3s;
}

.tab.active{
    background:#8b5cf6;
}

.search{
    width:100%;
    padding:16px;
    border:none;
    outline:none;
    border-radius:16px;
    background:rgba(255,255,255,.08);
    color:white;
    margin-bottom:25px;
}

.search::placeholder{
    color:#bbb;
}

.commands{
    display:grid;
    gap:16px;
}

.card{
    padding:20px;
}

.card h3{
    margin-bottom:10px;
}

.command-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    margin-top:12px;
}

.code{
    flex:1;
    background:#121220;
    padding:12px;
    border-radius:12px;
    overflow:auto;
    font-family:Consolas, monospace;
}

.copy-btn{
    border:none;
    cursor:pointer;
    padding:10px 18px;
    border-radius:12px;
    background:#8b5cf6;
    color:white;
    transition:.3s;
}

.copy-btn:hover{
    transform:translateY(-2px);
}

.hidden{
    display:none !important;
}

.modal{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,.7);

display:flex;

justify-content:center;
align-items:center;

z-index:9999;
}

.modal-content{

width:500px;

max-width:90%;

padding:30px;
}

.details-btn{

background:#374151;

border:none;

padding:10px 18px;

border-radius:12px;

cursor:pointer;

color:white;
}

.details-btn:hover{

transform:translateY(-2px);
}

.footer{
    text-align:center;
    opacity:.5;
    margin-top:30px;
}
</style>
</head>
<body>

<div class="container">

<div class="header">
<h1>⚡ Code Box</h1>
<p>Personal Linux & Windows Cheat Sheet</p>
</div>

<div class="tabs">

<button
class="tab main-tab active"
onclick="switchTab('linux',this)">
Linux
</button>
    
<button
class="tab main-tab"
onclick="switchTab('windows',this)">
Windows
</button>
    
</div>

<input
type="text"
id="search"
class="search glass"
placeholder="Search commands..."
onkeyup="filterCommands()"
/>

<div id="subTabs" class="tabs"></div>

<div
id="commandContainer"
class="commands">
</div>


<div class="footer">
Command Vault ©
</div>

</div>


<div
id="modal"
class="modal hidden">

<div class="modal-content glass">

<h2 id="modalTitle"></h2>

<p id="modalText"></p>

<br>

<button
class="copy-btn"
onclick="closeModal()">

Close

</button>

</div>

</div>

<script src="commands.js"></script>
<script src="app.js"></script>

</body>
</html>
